# Attrazioni italiane monitorate.
#
# COME AGGIUNGERNE UNA: copia un blocco qui sotto e cambia "name" e "city".
# COME RIMUOVERNE UNA:  cancella il suo blocco.
# Lo "slug" e' opzionale: se lo ometti viene generato dal nome.
#
# I dati di affluenza NON si mettono qui: vengono raccolti da fonti attuali
# dallo script settimanale (gather.py --mode weekly-attractions) e salvati in
# data/affluence.json.

attractions:
  - name: Colosseo & Foro Romano
    city: Roma
  - name: Musei Vaticani & Cappella Sistina
    city: Roma
  - name: Galleria Borghese
    city: Roma
  - name: Cupola del Brunelleschi (Duomo Firenze)
    city: Firenze
  - name: Galleria degli Uffizi
    city: Firenze
  - name: Palazzo Ducale
    city: Venezia
